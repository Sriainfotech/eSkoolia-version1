name: CI — Admissions Command Center

on:
  push:
    branches: ["feature/admissions-command-center", "main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────── Backend ───────────────
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: eskoolia_test
          POSTGRES_USER: eskoolia
          POSTGRES_PASSWORD: eskoolia
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgres://eskoolia:eskoolia@localhost:5432/eskoolia_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key
      SMS_PROVIDER: stub
      AI_PROVIDER: stub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libcairo2-dev pkg-config python3-dev libpango1.0-dev libgdk-pixbuf2.0-dev libffi-dev shared-mime-info

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check apps/admissions/

      - name: Django check
        run: python manage.py check --deploy --fail-level ERROR

      - name: Apply migrations
        run: python manage.py migrate --run-syncdb

      - name: Check no missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: |
          pip install pytest pytest-django pytest-cov
          pytest apps/admissions/ -v --cov=apps/admissions --cov-report=term-missing

  # ─────────────── Frontend ───────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  # ─────────────── Deploy to Staging ───────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/feature/admissions-command-center' || github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend to staging
        run: echo "Wire your SSH/cloud deploy step here"

      - name: Deploy frontend to staging
        run: echo "Wire your Vercel/Netlify/SSH step here"
