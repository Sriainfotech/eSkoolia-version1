version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: eskoolia
      POSTGRES_USER: eskoolia
      POSTGRES_PASSWORD: eskoolia
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eskoolia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Django API ──────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.local
    environment:
      DATABASE_URL: postgres://eskoolia:eskoolia@db:5432/eskoolia
      REDIS_URL: redis://redis:6379/0
      SMS_PROVIDER: stub
      AI_PROVIDER: stub
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery:
    build: ./backend
    command: celery -A config worker -l info -Q default,admissions
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.local
    environment:
      DATABASE_URL: postgres://eskoolia:eskoolia@db:5432/eskoolia
      REDIS_URL: redis://redis:6379/0
      SMS_PROVIDER: stub
      AI_PROVIDER: stub
    depends_on:
      - backend
      - redis

  # ── Celery Beat (scheduler) ─────────────────────────────────────────────────
  celery-beat:
    build: ./backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.local
    environment:
      DATABASE_URL: postgres://eskoolia:eskoolia@db:5432/eskoolia
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - celery

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pg_data:
